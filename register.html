<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAttendance Pro - Enhanced Digital ID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .glass-effect {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 50%, #1e293b 100%);
        }
        
        .purple-glow {
            box-shadow: 0 0 60px rgba(139, 92, 246, 0.3), 0 0 100px rgba(139, 92, 246, 0.1);
        }
        
        .qr-glow {
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.2), 0 0 80px rgba(139, 92, 246, 0.15);
            animation: qrPulse 3s ease-in-out infinite;
        }
        
        @keyframes qrPulse {
            0%, 100% { box-shadow: 0 0 40px rgba(255, 255, 255, 0.2), 0 0 80px rgba(139, 92, 246, 0.15); }
            50% { box-shadow: 0 0 60px rgba(255, 255, 255, 0.3), 0 0 100px rgba(139, 92, 246, 0.25); }
        }
        
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .status-dot {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .card-tilt {
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }
        
        .holographic {
            background: linear-gradient(135deg, 
                rgba(255,255,255,0) 0%, 
                rgba(255,255,255,0.05) 25%, 
                rgba(255,255,255,0) 50%, 
                rgba(255,255,255,0.05) 75%, 
                rgba(255,255,255,0) 100%);
            background-size: 200% 200%;
            animation: holographic 8s linear infinite;
        }
        
        @keyframes holographic {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 200%; }
        }
        
        .text-gradient {
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .info-row {
            transition: all 0.3s ease;
        }
        
        .info-row:hover {
            background: rgba(255,255,255,0.05);
            transform: translateX(5px);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4 overflow-hidden relative">
    <!-- Animated Background Elements -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-20 left-10 w-72 h-72 bg-purple-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
        <div class="absolute top-40 right-10 w-72 h-72 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-8 left-20 w-72 h-72 bg-indigo-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-4000"></div>
    </div>

    <!-- Main Card Container -->
    <div id="card" class="card-tilt relative w-full max-w-md purple-glow rounded-3xl overflow-hidden">
        <!-- Holographic Overlay -->
        <div class="absolute inset-0 holographic pointer-events-none z-10"></div>
        
        <!-- Card Content -->
        <div class="glass-effect rounded-3xl overflow-hidden relative">
            <!-- Header -->
            <div class="relative bg-gradient-to-r from-indigo-600 via-purple-600 to-indigo-800 p-6 overflow-hidden">
                <div class="absolute inset-0 shimmer"></div>
                <div class="relative flex items-center justify-between z-10">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-white/20 backdrop-blur rounded-xl flex items-center justify-center border border-white/30">
                            <span class="text-white font-bold text-lg">SA</span>
                        </div>
                        <div>
                            <h1 class="text-white font-bold text-lg tracking-tight">SmartAttendance Pro</h1>
                            <p class="text-indigo-200 text-xs uppercase tracking-wider">Student Digital ID</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 bg-white/10 backdrop-blur px-3 py-1.5 rounded-full border border-white/20">
                        <div class="w-2 h-2 bg-green-400 rounded-full status-dot"></div>
                        <span class="text-white text-xs font-medium">Active</span>
                    </div>
                </div>
                
                <!-- Decorative Circles -->
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
                <div class="absolute -bottom-10 -left-10 w-24 h-24 bg-purple-400/20 rounded-full blur-xl"></div>
            </div>

            <!-- Profile Section -->
            <div class="px-8 pt-8 pb-4 text-center relative">
                <!-- Avatar with Glow -->
                <div class="relative inline-block mb-4 floating">
                    <div class="absolute inset-0 bg-gradient-to-r from-purple-500 to-indigo-500 rounded-2xl blur-lg opacity-50"></div>
                    <div class="relative w-24 h-24 bg-gradient-to-br from-purple-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-2xl border-2 border-white/20">
                        <span class="text-4xl font-bold text-white">A</span>
                    </div>
                    <div class="absolute -bottom-1 -right-1 w-6 h-6 bg-green-500 rounded-full border-2 border-slate-900 flex items-center justify-center">
                        <svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                </div>

                <h2 class="text-2xl font-bold text-gradient mb-1">Anthony Sevilla</h2>
                <p class="text-slate-400 text-sm font-medium uppercase tracking-widest mb-6">Student</p>

                <!-- Info Grid -->
                <div class="space-y-3 mb-6">
                    <div class="info-row flex items-center justify-between p-3 rounded-xl bg-slate-800/50 border border-slate-700/50">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-indigo-500/20 flex items-center justify-center">
                                <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"/>
                                </svg>
                            </div>
                            <span class="text-slate-400 text-sm">ID Number</span>
                        </div>
                        <span class="text-white font-mono font-semibold tracking-wider">2026-00123</span>
                    </div>

                    <div class="info-row flex items-center justify-between p-3 rounded-xl bg-slate-800/50 border border-slate-700/50">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-purple-500/20 flex items-center justify-center">
                                <svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                                </svg>
                            </div>
                            <span class="text-slate-400 text-sm">Department</span>
                        </div>
                        <span class="text-white font-medium text-sm">BSIT — IT Department</span>
                    </div>

                    <div class="info-row flex items-center justify-between p-3 rounded-xl bg-slate-800/50 border border-slate-700/50">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-emerald-500/20 flex items-center justify-center">
                                <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                </svg>
                            </div>
                            <span class="text-slate-400 text-sm">Issued Date</span>
                        </div>
                        <span class="text-emerald-400 font-medium text-sm">Feb 27, 2026</span>
                    </div>
                </div>
            </div>

            <!-- QR Code Section - HIGHLIGHTED -->
            <div class="relative px-8 pb-8">
                <!-- Glow Effect Behind QR -->
                <div class="absolute inset-x-8 bottom-8 top-0 bg-gradient-to-t from-purple-500/30 to-transparent blur-2xl"></div>
                
                <div class="relative bg-white rounded-2xl p-6 qr-glow border-4 border-purple-500/30">
                    <!-- Corner Accents -->
                    <div class="absolute -top-1 -left-1 w-6 h-6 border-t-4 border-l-4 border-purple-500 rounded-tl-lg"></div>
                    <div class="absolute -top-1 -right-1 w-6 h-6 border-t-4 border-r-4 border-purple-500 rounded-tr-lg"></div>
                    <div class="absolute -bottom-1 -left-1 w-6 h-6 border-b-4 border-l-4 border-purple-500 rounded-bl-lg"></div>
                    <div class="absolute -bottom-1 -right-1 w-6 h-6 border-b-4 border-r-4 border-purple-500 rounded-br-lg"></div>
                    
                    <!-- QR Code -->
                    <div class="relative bg-white p-2 rounded-lg">
                        <svg viewBox="0 0 200 200" class="w-full h-auto">
                            <!-- Background -->
                            <rect width="200" height="200" fill="white"/>
                            
                            <!-- QR Pattern - Simplified representation -->
                            <g fill="black">
                                <!-- Position Detection Patterns -->
                                <rect x="10" y="10" width="50" height="50"/>
                                <rect x="15" y="15" width="40" height="40" fill="white"/>
                                <rect x="20" y="20" width="30" height="30"/>
                                <rect x="25" y="25" width="20" height="20" fill="white"/>
                                <rect x="30" y="30" width="10" height="10"/>
                                
                                <rect x="140" y="10" width="50" height="50"/>
                                <rect x="145" y="15" width="40" height="40" fill="white"/>
                                <rect x="150" y="20" width="30" height="30"/>
                                <rect x="155" y="25" width="20" height="20" fill="white"/>
                                <rect x="160" y="30" width="10" height="10"/>
                                
                                <rect x="10" y="140" width="50" height="50"/>
                                <rect x="15" y="145" width="40" height="40" fill="white"/>
                                <rect x="20" y="150" width="30" height="30"/>
                                <rect x="25" y="155" width="20" height="20" fill="white"/>
                                <rect x="30" y="160" width="10" height="10"/>
                                
                                <!-- Data Modules - Random pattern for visual -->
                                <rect x="70" y="10" width="10" height="10"/>
                                <rect x="90" y="10" width="10" height="10"/>
                                <rect x="110" y="20" width="10" height="10"/>
                                <rect x="70" y="30" width="10" height="10"/>
                                <rect x="100" y="30" width="10" height="10"/>
                                <rect x="120" y="30" width="10" height="10"/>
                                
                                <rect x="10" y="70" width="10" height="10"/>
                                <rect x="30" y="70" width="10" height="10"/>
                                <rect x="50" y="70" width="10" height="10"/>
                                <rect x="10" y="90" width="10" height="10"/>
                                <rect x="40" y="90" width="10" height="10"/>
                                <rect x="10" y="110" width="10" height="10"/>
                                <rect x="30" y="110" width="10" height="10"/>
                                <rect x="50" y="110" width="10" height="10"/>
                                
                                <rect x="70" y="70" width="60" height="60" fill="none" stroke="black" stroke-width="2"/>
                                <rect x="80" y="80" width="40" height="40"/>
                                <rect x="90" y="90" width="20" height="20" fill="white"/>
                                <rect x="95" y="95" width="10" height="10"/>
                                
                                <rect x="140" y="70" width="10" height="10"/>
                                <rect x="160" y="70" width="10" height="10"/>
                                <rect x="180" y="70" width="10" height="10"/>
                                <rect x="140" y="90" width="10" height="10"/>
                                <rect x="170" y="90" width="10" height="10"/>
                                <rect x="140" y="110" width="10" height="10"/>
                                <rect x="160" y="110" width="10" height="10"/>
                                <rect x="180" y="110" width="10" height="10"/>
                                
                                <rect x="70" y="140" width="10" height="10"/>
                                <rect x="90" y="140" width="10" height="10"/>
                                <rect x="110" y="140" width="10" height="10"/>
                                <rect x="70" y="160" width="10" height="10"/>
                                <rect x="100" y="160" width="10" height="10"/>
                                <rect x="120" y="160" width="10" height="10"/>
                                <rect x="70" y="180" width="10" height="10"/>
                                <rect x="90" y="180" width="10" height="10"/>
                                <rect x="110" y="180" width="10" height="10"/>
                                
                                <rect x="140" y="140" width="10" height="10"/>
                                <rect x="160" y="140" width="10" height="10"/>
                                <rect x="180" y="140" width="10" height="10"/>
                                <rect x="140" y="160" width="10" height="10"/>
                                <rect x="170" y="160" width="10" height="10"/>
                                <rect x="140" y="180" width="10" height="10"/>
                                <rect x="160" y="180" width="10" height="10"/>
                                <rect x="180" y="180" width="10" height="10"/>
                            </g>
                        </svg>
                    </div>
                    
                    <!-- Scan Line Animation -->
                    <div class="absolute inset-0 overflow-hidden rounded-2xl pointer-events-none">
                        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-transparent via-purple-500 to-transparent opacity-50" 
                             style="animation: scan 2s linear infinite;"></div>
                    </div>
                </div>
                
                <!-- Code Label -->
                <div class="mt-4 text-center">
                    <p class="text-slate-500 text-xs uppercase tracking-widest mb-1">Verification Code</p>
                    <p class="text-slate-300 font-mono text-sm font-semibold tracking-wider">SA-ANTH-2026-00123</p>
                </div>
            </div>

            <!-- Bottom Security Bar -->
            <div class="bg-gradient-to-r from-slate-800 to-slate-900 p-4 border-t border-slate-700/50">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <svg class="w-4 h-4 text-emerald-500" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                        </svg>
                        <span class="text-slate-400 text-xs">Secure Digital Identity</span>
                    </div>
                    <div class="flex gap-1">
                        <div class="w-1.5 h-1.5 bg-slate-600 rounded-full"></div>
                        <div class="w-1.5 h-1.5 bg-slate-600 rounded-full"></div>
                        <div class="w-1.5 h-1.5 bg-purple-500 rounded-full"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
        
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        
        .animate-blob {
            animation: blob 7s infinite;
        }
        
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        
        .animation-delay-4000 {
            animation-delay: 4s;
        }
    </style>

    <script>
        // 3D Tilt Effect
        const card = document.getElementById('card');
        
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
        
        // Reset on mouse leave
        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });
    </script>
</body>
</html>
